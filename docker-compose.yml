version: '3.9'

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    expose:
      - "8000"
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/app/db
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/app/db
    depends_on:
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/app/db
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A settings flower --basic_auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
  static_files:
  media_files: